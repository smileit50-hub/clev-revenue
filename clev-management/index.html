<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLEV - 매출 관리 시스템</title>
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-blue-dark: #1e40af;
            --brand-blue-light: #60a5fa;
            --luxury-glass: rgba(255, 255, 255, 0.05);
            --luxury-border: rgba(255, 255, 255, 0.08);
            --bg-main: #0a0a0c;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            scroll-behavior: smooth;
            margin: 0;
        }

        .font-brand {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism Refined for Light Theme */
        .glass-card {
            background: var(--luxury-glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--luxury-border);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
        }

        .glass-card:hover {
            border: 1px solid rgba(37, 99, 235, 0.2);
            box-shadow: 0 20px 40px -15px rgba(37, 99, 235, 0.1);
        }

        /* Animations */
        @keyframes fade-up {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .animate-fade-up {
            animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-blue);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes pulse-soft {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px rgba(59, 130, 246, 0));
            }

            50% {
                transform: scale(1.02);
                filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.2));
            }
        }

        .animate-pulse-soft {
            animation: pulse-soft 4s ease-in-out infinite;
        }

        @keyframes slide-in-right {
            0% {
                transform: translateX(30px);
                opacity: 0;
            }

            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animate-slide-in {
            animation: slide-in-right 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Config & Constants ---
        const LEAD_SOURCES = ['블로그', '당근', '플레이스', '홈페이지', 'SNS', '정읍 톡톡', '지인소개', '영업', '기타'];
        const SOURCE_COLORS = {
            '블로그': '#3b82f6', '당근': '#f97316', '플레이스': '#22c55e',
            '홈페이지': '#a855f7', 'SNS': '#ec4899', '정읍 톡톡': '#eab308',
            '지인소개': '#06b6d4', '영업': '#6366f1', '기타': '#64748b'
        };

        const EXPENSE_CATEGORIES = ['인건비', '유류비', '물품구입비', '식비/식대', '광고/마케팅', '기타'];
        const EXPENSE_COLORS = {
            '인건비': '#f43f5e', '유류비': '#f97316', '물품구입비': '#eab308',
            '식비/식대': '#22c55e', '광고/마케팅': '#3b82f6', '기타': '#64748b'
        };

        // --- Custom Hook: LocalStorage DB ---
        const useSalesDB = () => {
            const [sales, setSales] = useState(() => {
                const saved = localStorage.getItem('CLEV_SALES_DB');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('CLEV_SALES_DB', JSON.stringify(sales));
            }, [sales]);

            const addSale = (sale) => setSales(prev => [sale, ...prev]);
            const deleteSale = (id) => {
                if (confirm('정말 삭제하시겠습니까?')) {
                    setSales(prev => prev.filter(s => s.id !== id));
                }
            };
            const updateSale = (id, updated) => setSales(prev => prev.map(s => s.id === id ? updated : s));
            const importData = (data) => setSales(data);

            return { sales, addSale, deleteSale, updateSale, importData };
        };

        // --- Components ---
        const Icon = ({ name, size = 20, color = "currentColor", className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons({
                        attrs: { size, stroke: color },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, color]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Card = ({ title, value, sub, icon, trend, colorClass = "from-blue-500 to-indigo-600" }) => (
            <div className="glass-card rounded-[2rem] p-8 flex flex-col justify-between overflow-hidden relative group transition-all duration-500 hover:-translate-y-2">
                <div className={`absolute top-0 right-0 w-24 h-24 bg-gradient-to-br ${colorClass} opacity-5 blur-3xl group-hover:opacity-10 transition-opacity`}></div>
                <div className="flex justify-between items-start mb-6">
                    <div className="p-4 bg-blue-500/10 rounded-2xl border border-blue-500/10 shadow-inner"><Icon name={icon} size={24} color="#3b82f6" /></div>
                    {trend && <span className={`text-xs font-black flex items-center gap-1 ${trend > 0 ? 'text-emerald-600' : 'text-red-500'}`}>
                        {trend > 0 ? '▲' : '▼'} {Math.abs(trend)}%
                    </span>}
                </div>
                <div>
                    <p className="text-gray-400 font-bold text-sm mb-2">{title}</p>
                    <h2 className="text-3xl font-brand font-black text-white tracking-tight">{value}</h2>
                    <p className="text-[10px] text-gray-500 font-bold mt-2 uppercase tracking-widest">{sub}</p>
                </div>
            </div>
        );

        const SimpleChart = ({ data, type = 'line' }) => {
            if (data.length === 0) return <div className="h-full flex items-center justify-center text-gray-500 font-bold italic">No Data Collected Yet</div>;

            const maxVal = Math.max(...data.map(d => d.value), 1);
            const height = 180;
            const width = 600;
            const padding = 30;
            const colors = ['#2563eb', '#f43f5e']; // Income, Profit

            if (type === 'bar') {
                const barWidth = (width - padding * 2) / data.length;
                return (
                    <div className="w-full h-full relative group">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                            {data.map((d, i) => {
                                const barHeight = (d.value / maxVal) * (height - padding * 2);
                                const x = padding + i * barWidth;
                                const y = height - padding - barHeight;
                                return (
                                    <g key={i} className="group/bar">
                                        <rect x={x + 4} y={y} width={barWidth - 8} height={barHeight} fill={d.type === 'expense' ? '#f43f5e' : '#3b82f6'} rx="4" className="opacity-40 group-hover/bar:opacity-80 transition-all duration-300" />
                                        <text x={x + barWidth / 2} y={y - 8} textAnchor="middle" fill={d.type === 'expense' ? '#fb7185' : '#60a5fa'} className="text-[8px] font-black opacity-0 group-hover/bar:opacity-100 transition-opacity">{d.value.toLocaleString()}</text>
                                        <text x={x + barWidth / 2} y={height - 10} textAnchor="middle" fill="#475569" className="text-[8px] font-bold">{d.label}</text>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                );
            }

            // Dual Line Logic (for Monthly Trend)
            const incomePoints = data.map((d, i) => {
                const x = (i / (data.length - 1 || 1)) * (width - padding * 2) + padding;
                const y = height - (d.value / maxVal) * (height - padding * 2) - padding;
                return `${x},${y}`;
            }).join(' ');

            const profitPoints = data.map((d, i) => {
                const x = (i / (data.length - 1 || 1)) * (width - padding * 2) + padding;
                const pVal = d.profit || 0;
                const y = height - (pVal / maxVal) * (height - padding * 2) - padding;
                return `${x},${y}`;
            }).join(' ');

            return (
                <div className="w-full h-full relative group">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                        <polyline points={incomePoints} fill="none" stroke="#2563eb" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="opacity-30" />
                        <polyline points={profitPoints} fill="none" stroke="#10b981" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-[0_0_8px_rgba(16,185,129,0.5)]" />
                        {data.map((d, i) => {
                            const x = (i / (data.length - 1 || 1)) * (width - padding * 2) + padding;
                            const y = height - (d.value / maxVal) * (height - padding * 2) - padding;
                            const py = height - ((d.profit || 0) / maxVal) * (height - padding * 2) - padding;
                            return (
                                <g key={i} className="group/dot cursor-pointer">
                                    <circle cx={x} cy={y} r="4" fill="#0a0a0c" stroke="#2563eb" strokeWidth="2" opacity="0.3" />
                                    <circle cx={x} cy={py} r="5" fill="#0a0a0c" stroke="#10b981" strokeWidth="2" className="transition-all duration-300 group-hover/dot:r-7" />
                                    <text x={x} y={py - 15} textAnchor="middle" fill="#34d399" className="text-[10px] font-black opacity-0 group-hover/dot:opacity-100 transition-opacity">
                                        {d.profit?.toLocaleString()}
                                    </text>
                                    <text x={x} y={height - 10} textAnchor="middle" fill="#475569" className="text-[8px] font-bold">{d.label}</text>
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        const PremiumCalendar = ({ year, month, sales, onDateClick, selectedDay, onMonthChange }) => {
            const daysInMonth = new Date(year, month, 0).getDate();
            const firstDay = new Date(year, month - 1, 1).getDay();
            const days = [];

            // Fill empty slots
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);

            const hasWork = (day) => {
                if (!day) return false;
                const dStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return sales.some(s => s.date === dStr);
            };

            const isToday = (day) => {
                const today = new Date();
                return today.getFullYear() === year && today.getMonth() + 1 === month && today.getDate() === day;
            };

            return (
                <div className="glass-card rounded-[2.5rem] p-8 flex flex-col h-full relative overflow-hidden group">
                    <div className="absolute -top-10 -right-10 w-40 h-40 bg-blue-600/5 blur-3xl group-hover:bg-blue-600/10 transition-colors"></div>
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl font-brand font-black text-white shrink-0">{year}년 {month}월</h2>
                        <div className="flex gap-2">
                            <button onClick={() => onMonthChange(-1)} className="p-2 bg-white/5 text-gray-400 rounded-xl hover:bg-blue-600 hover:text-white transition-all active:scale-95"><Icon name="chevron-left" size={14} /></button>
                            <button onClick={() => onDateClick(null)} className="px-3 py-2 bg-white/5 text-gray-400 rounded-xl hover:bg-blue-600 hover:text-white text-[9px] font-black uppercase transition-all active:scale-95">All</button>
                            <button onClick={() => onMonthChange(1)} className="p-2 bg-white/5 text-gray-400 rounded-xl hover:bg-blue-600 hover:text-white transition-all active:scale-95"><Icon name="chevron-right" size={14} /></button>
                        </div>
                    </div>

                    <div className="grid grid-cols-7 gap-1 mb-2">
                        {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => (
                            <div key={d} className="text-center text-[9px] font-black text-gray-600 uppercase py-2">{d}</div>
                        ))}
                    </div>

                    <div className="grid grid-cols-7 gap-1 flex-grow">
                        {days.map((day, i) => {
                            const dStr = day ? `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}` : null;
                            const daySales = dStr ? sales.filter(s => s.date === dStr) : [];
                            const hasIncome = daySales.some(s => (s.type || 'income') === 'income');
                            const hasExpense = daySales.some(s => s.type === 'expense');

                            return (
                                <div key={i} className="aspect-square relative flex items-center justify-center">
                                    {day && (
                                        <button
                                            onClick={() => onDateClick(day)}
                                            className={`w-full h-full rounded-xl text-[10px] font-bold transition-all flex flex-col items-center justify-center gap-1 group/day border
                                                ${selectedDay === day ? 'bg-blue-600 text-white border-blue-400 shadow-lg scale-105 z-10' :
                                                    isToday(day) ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' :
                                                        'bg-white/5 text-gray-500 border-transparent hover:bg-white/10 hover:text-white'}`}
                                        >
                                            <span className={selectedDay === day ? 'font-black' : ''}>{day}</span>
                                            <div className="flex gap-0.5">
                                                {hasIncome && <div className="w-1 h-1 bg-blue-500 rounded-full"></div>}
                                                {hasExpense && <div className="w-1 h-1 bg-rose-500 rounded-full"></div>}
                                            </div>
                                        </button>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-6 pt-4 border-t border-white/5 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-1.5">
                                <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                <span className="text-[8px] font-black text-gray-500 uppercase tracking-widest">Income</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <div className="w-2 h-2 rounded-full bg-rose-500"></div>
                                <span className="text-[8px] font-black text-gray-500 uppercase tracking-widest">Expense</span>
                            </div>
                        </div>
                        {selectedDay && <span className="text-[8px] font-black text-blue-600 uppercase tracking-widest">Day {selectedDay} Active</span>}
                    </div>
                </div>
            );
        };

        const DonutChart = ({ data }) => {
            if (data.length === 0) return <div className="h-full flex items-center justify-center text-gray-500 text-xs italic">데이터 없음</div>;

            const total = data.reduce((acc, curr) => acc + curr.value, 0);
            let currentAngle = -90;
            const radius = 70;
            const strokeWidth = 25;
            const center = 100;

            return (
                <div className="flex items-center gap-8 h-full">
                    <svg viewBox="0 0 200 200" className="w-40 h-40 drop-shadow-2xl">
                        {data.map((d, i) => {
                            const percentage = (d.value / total) * 100;
                            const angle = (percentage / 100) * 360;
                            const x1 = center + radius * Math.cos((currentAngle * Math.PI) / 180);
                            const y1 = center + radius * Math.sin((currentAngle * Math.PI) / 180);
                            currentAngle += angle;
                            const x2 = center + radius * Math.cos((currentAngle * Math.PI) / 180);
                            const y2 = center + radius * Math.sin((currentAngle * Math.PI) / 180);
                            const largeArc = angle > 180 ? 1 : 0;

                            return (
                                <path key={i}
                                    d={`M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`}
                                    fill="none" stroke={d.color} strokeWidth={strokeWidth}
                                    className="transition-all duration-500 hover:opacity-80" />
                            );
                        })}
                        <text x="100" y="105" textAnchor="middle" fill="white" className="text-lg font-black font-brand">TOP 1</text>
                        <text x="100" y="125" textAnchor="middle" fill="#64748b" className="text-[8px] font-black uppercase tracking-widest">{data[0]?.label}</text>
                    </svg>
                    <div className="flex-1 space-y-2">
                        {data.slice(0, 5).map((d, i) => (
                            <div key={i} className="flex items-center justify-between group">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full" style={{ background: d.color }}></div>
                                    <span className="text-[10px] font-black text-gray-500 group-hover:text-white transition-colors">{d.label}</span>
                                </div>
                                <span className="text-[10px] font-brand font-bold text-gray-600">{((d.value / total) * 100).toFixed(1)}%</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const FormModal = ({ isOpen, onClose, onSave }) => {
            const [recordType, setRecordType] = useState('income');
            const [formData, setFormData] = useState({
                date: '', client: '', amount: '', category: '상가', leadSource: '블로그', status: '입금완료', type: 'income', note: ''
            });

            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                setFormData(prev => ({ ...prev, date: today, type: recordType, category: recordType === 'income' ? '상가' : '인건비' }));
            }, [isOpen, recordType]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md transition-all duration-300">
                    <div className="glass-card rounded-[3rem] w-full max-w-lg p-10 relative bg-[#0a0a0c] shadow-2xl">
                        <button onClick={onClose} className="absolute top-8 right-8 text-gray-500 hover:text-white transition-colors"><Icon name="x" /></button>

                        <div className="flex bg-white/5 p-1 rounded-2xl border border-white/10 mb-8 w-fit mx-auto">
                            <button onClick={() => setRecordType('income')} className={`px-8 py-2 rounded-xl text-[10px] font-black transition-all ${recordType === 'income' ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-500 hover:text-white'}`}>매출 등록</button>
                            <button onClick={() => setRecordType('expense')} className={`px-8 py-2 rounded-xl text-[10px] font-black transition-all ${recordType === 'expense' ? 'bg-rose-600 text-white shadow-lg' : 'text-gray-500 hover:text-white'}`}>지출 등록</button>
                        </div>

                        <h2 className="text-3xl font-black mb-8 text-white tracking-tight text-center">{recordType === 'income' ? '매출 내역 등록' : '지출 내역 등록'}</h2>

                        <form className="space-y-6" onSubmit={(e) => { e.preventDefault(); onSave(formData); onClose(); }}>
                            <div className="grid grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-1">날짜</label>
                                    <input type="date" required value={formData.date} onChange={(e) => setFormData({ ...formData, date: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition-all text-white" />
                                </div>
                                <div>
                                    <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-1">금액 (원)</label>
                                    <input type="number" required placeholder="0" value={formData.amount} onChange={(e) => setFormData({ ...formData, amount: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition-all text-white font-bold" />
                                </div>
                            </div>

                            {recordType === 'income' ? (
                                <>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-2">고객/상호명</label>
                                            <input type="text" required placeholder="예: 스타벅스 강남" value={formData.client} onChange={(e) => setFormData({ ...formData, client: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition-all text-white" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-2">유입 경로</label>
                                            <select value={formData.leadSource} onChange={(e) => setFormData({ ...formData, leadSource: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition-all text-white appearance-none">
                                                {LEAD_SOURCES.map(source => <option key={source} value={source} className="bg-[#0a0a0c]">{source}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-2">분류</label>
                                            <select value={formData.category} onChange={(e) => setFormData({ ...formData, category: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition-all text-white appearance-none">
                                                <option value="상가" className="bg-[#0a0a0c]">상가 유리창</option>
                                                <option value="오피스" className="bg-[#0a0a0c]">오피스 클리닝</option>
                                                <option value="특수" className="bg-[#0a0a0c]">특수 코팅/세정</option>
                                                <option value="기타" className="bg-[#0a0a0c]">기타 작업</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-2">입금 상태</label>
                                            <select value={formData.status} onChange={(e) => setFormData({ ...formData, status: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition-all text-white appearance-none">
                                                <option value="입금완료" className="bg-[#0a0a0c]">입금 완료</option>
                                                <option value="미입금" className="bg-[#0a0a0c]">미입금 (청구)</option>
                                                <option value="부분입금" className="bg-[#0a0a0c]">부분 입금</option>
                                            </select>
                                        </div>
                                    </div>
                                </>
                            ) : (
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-2">지출 상세 내용</label>
                                        <input type="text" required placeholder="예: 현장 인건비 및 식대" value={formData.client} onChange={(e) => setFormData({ ...formData, client: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-rose-500 transition-all text-white" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2 ml-2">지출 항목 (복수 선택 가능)</label>
                                        <div className="flex flex-wrap gap-2">
                                            {EXPENSE_CATEGORIES.map(cat => {
                                                const isSelected = Array.isArray(formData.category) ? formData.category.includes(cat) : formData.category === cat;
                                                return (
                                                    <button
                                                        key={cat}
                                                        type="button"
                                                        onClick={() => {
                                                            const current = Array.isArray(formData.category) ? [...formData.category] : [formData.category];
                                                            const next = isSelected ? current.filter(c => c !== cat) : [...current, cat];
                                                            setFormData({ ...formData, category: next });
                                                        }}
                                                        className={`px-4 py-2 rounded-xl text-[10px] font-black transition-all border ${isSelected ? 'bg-rose-600 border-rose-400 text-white shadow-lg' : 'bg-white/5 border-white/10 text-gray-500 hover:text-white'
                                                            }`}
                                                    >
                                                        {cat}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            <button type="submit" className={`w-full ${recordType === 'income' ? 'bg-blue-600 hover:bg-blue-500 shadow-blue-600/20' : 'bg-rose-600 hover:bg-rose-500 shadow-rose-600/20'} text-white font-black py-5 rounded-[2rem] shadow-xl transition-all active:scale-95 transform hover:-translate-y-1 mt-4`}>
                                {recordType === 'income' ? '매출 저장하기' : '지출 저장하기'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const StartPage = ({ onLaunch, stats }) => {
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good Morning' : hour < 18 ? 'Good Afternoon' : 'Good Evening';

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#0a0a0c] overflow-hidden relative">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-600/5 blur-[120px] rounded-full animate-pulse-soft"></div>

                    <div className="relative z-10 flex flex-col items-center animate-fade-up">
                        <div className="w-32 h-32 mb-10 animate-pulse-soft">
                            <img src="assets/logo.png" alt="CLEV" className="w-full h-full object-contain" />
                        </div>
                        <h2 className="text-sm font-black text-blue-500 uppercase tracking-[0.5em] mb-4">{greeting}, Maestro</h2>
                        <h1 className="text-6xl md:text-8xl font-brand font-black text-white tracking-tighter mb-12 text-center leading-none">
                            CLEV <span className="text-gray-800">MAESTRO</span>
                        </h1>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl mb-16">
                            <div className="glass-card rounded-3xl p-8 flex flex-col items-start gap-4 animate-slide-in [animation-delay:200ms]">
                                <div className="p-3 bg-blue-500/10 rounded-xl text-blue-500"><Icon name="bar-chart-3" size={20} /></div>
                                <div>
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Monthly Revenue</p>
                                    <p className="text-2xl font-brand font-black text-white">{stats.revenue.toLocaleString()}원</p>
                                </div>
                            </div>
                            <div className="glass-card rounded-3xl p-8 flex flex-col items-start gap-4 animate-slide-in [animation-delay:400ms]">
                                <div className="p-3 bg-emerald-500/10 rounded-xl text-emerald-500"><Icon name="check-circle" size={20} /></div>
                                <div>
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Growth Trend</p>
                                    <p className="text-2xl font-brand font-black text-white">{stats.count} Projects</p>
                                </div>
                            </div>
                            <div className="glass-card rounded-3xl p-8 flex flex-col items-start gap-4 animate-slide-in [animation-delay:600ms]">
                                <div className="p-3 bg-orange-500/10 rounded-xl text-orange-500"><Icon name="alert-circle" size={20} /></div>
                                <div>
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Action items</p>
                                    <p className="text-2xl font-brand font-black text-white">{stats.unpaid} Unpaid</p>
                                </div>
                            </div>
                        </div>

                        <button
                            onClick={onLaunch}
                            className="group relative px-12 py-5 bg-blue-600 hover:bg-blue-500 rounded-[2rem] text-white font-black text-xl shadow-2xl shadow-blue-600/30 transition-all hover:scale-105 active:scale-95 flex items-center gap-4"
                        >
                            <span className="relative z-10">대시보드 런칭</span>
                            <Icon name="arrow-right" className="relative z-10 transition-transform group-hover:translate-x-2" />
                            <div className="absolute inset-0 rounded-[2rem] bg-gradient-to-r from-blue-400 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity blur-xl"></div>
                        </button>
                    </div>

                    <p className="absolute bottom-10 left-1/2 -translate-x-1/2 text-[10px] font-black text-gray-800 uppercase tracking-[0.8em]">Business Intelligence Maestro</p>
                </div>
            );
        };

        const App = () => {
            const { sales, addSale, deleteSale, importData } = useSalesDB();
            const [view, setView] = useState('start'); // 'start' or 'dashboard'
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [filter, setFilter] = useState({ month: new Date().getMonth() + 1, year: new Date().getFullYear() });
            const [selectedDay, setSelectedDay] = useState(null); // specific day selection
            const [viewMode, setViewMode] = useState('monthly'); // 'monthly' or 'yearly'
            const [applyVat, setApplyVat] = useState(false); // Tax status toggle

            // Quick Stats for Start Page
            const startStats = useMemo(() => {
                const currentMonth = new Date().getMonth() + 1;
                const currentYear = new Date().getFullYear();
                const filtered = sales.filter(s => {
                    const d = new Date(s.date);
                    return d.getFullYear() === currentYear && d.getMonth() + 1 === currentMonth;
                });
                return {
                    revenue: filtered.reduce((acc, curr) => acc + Number(curr.amount), 0),
                    count: filtered.length,
                    unpaid: filtered.filter(s => s.status === '미입금').length
                };
            }, [sales]);

            // Calculations
            const filteredSales = useMemo(() => {
                return sales.filter(s => {
                    const date = new Date(s.date);
                    if (viewMode === 'yearly') {
                        return date.getFullYear() === filter.year;
                    }
                    const monthMatch = date.getFullYear() === filter.year && (date.getMonth() + 1) === filter.month;
                    if (selectedDay) {
                        return monthMatch && date.getDate() === selectedDay;
                    }
                    return monthMatch;
                });
            }, [sales, filter, selectedDay, viewMode]);

            const totalIncome = filteredSales.filter(s => (s.type || 'income') === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalExpense = filteredSales.filter(s => s.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const vat = Math.floor(totalIncome * 0.1);
            const netProfit = (applyVat ? totalIncome - vat : totalIncome) - totalExpense;
            const unpaidCount = filteredSales.filter(s => s.status === '미입금').length;

            // Trend Data
            const chartData = useMemo(() => {
                const data = [];
                const maxMonths = viewMode === 'monthly' ? 5 : 11;
                const loopLimit = viewMode === 'monthly' ? 5 : 12;

                for (let i = loopLimit; i >= (viewMode === 'monthly' ? 0 : 1); i--) {
                    let month, year;
                    if (viewMode === 'monthly') {
                        const d = new Date();
                        d.setMonth(d.getMonth() - i);
                        month = d.getMonth() + 1;
                        year = d.getFullYear();
                    } else {
                        month = loopLimit - i + 1;
                        year = filter.year;
                    }

                    const monthData = sales.filter(s => {
                        const sd = new Date(s.date);
                        return sd.getFullYear() === year && (sd.getMonth() + 1) === month;
                    });

                    const income = monthData.filter(s => (s.type || 'income') === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
                    const expense = monthData.filter(s => s.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
                    const vatVal = Math.floor(income * 0.1);
                    const profit = (applyVat ? income - vatVal : income) - expense;

                    data.push({
                        label: `${month}월`,
                        value: income,
                        profit: profit,
                        type: viewMode === 'yearly' ? (income >= expense ? 'income' : 'expense') : 'income'
                    });
                }
                return data;
            }, [sales, filter.year, viewMode, applyVat]);

            // Pie/Donut Data (Combined Income/Expense Distribution)
            const sourceData = useMemo(() => {
                const map = {};
                filteredSales.forEach(s => {
                    const categories = Array.isArray(s.category) ? s.category : [s.category];
                    const labels = (s.type === 'expense') ? categories : [s.leadSource || '기타'];
                    labels.forEach(label => {
                        map[label] = (map[label] || 0) + 1;
                    });
                });
                return Object.entries(map)
                    .map(([label, value]) => {
                        const color = EXPENSE_COLORS[label] || SOURCE_COLORS[label] || '#64748b';
                        return { label, value, color };
                    })
                    .sort((a, b) => b.value - a.value);
            }, [filteredSales]);

            const exportYearlyData = () => {
                const yearlyData = sales.filter(s => new Date(s.date).getFullYear() === filter.year);
                if (yearlyData.length === 0) return alert('해당 연도의 데이터가 없습니다.');
                const blob = new Blob([JSON.stringify(yearlyData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `clev-sales-${filter.year}-archive.json`;
                a.click();
            };

            const exportData = () => {
                const blob = new Blob([JSON.stringify(sales, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `clev-sales-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (Array.isArray(data)) {
                            importData(data);
                            alert('데이터를 성공적으로 불러왔습니다.');
                        }
                    } catch (err) { alert('파일이 올바르지 않습니다.'); }
                };
                reader.readAsText(file);
            };

            if (view === 'start') {
                return <StartPage onLaunch={() => setView('dashboard')} stats={startStats} />;
            }

            return (
                <div className="min-h-screen px-6 py-12 md:px-12 lg:px-24 animate-fade-up">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-16 gap-8 animate-fade-up">
                        <div className="flex items-center space-x-4">
                            <div className="w-16 h-16 flex items-center justify-center p-2 overflow-hidden">
                                <img src="assets/logo.png" alt="CLEV" className="w-full h-full object-contain" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-brand font-black text-white tracking-tighter">CLEV <span className="font-light text-gray-500">SALES</span></h1>
                                <p className="text-[10px] text-gray-500 font-bold tracking-[0.3em] uppercase">Premium Asset Management</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex bg-white/5 p-1 rounded-2xl border border-white/10 mr-4">
                                <button onClick={() => setViewMode('monthly')} className={`px-6 py-2 rounded-xl text-[10px] font-black transition-all ${viewMode === 'monthly' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-400 hover:text-white'}`}>월간 분석</button>
                                <button onClick={() => setViewMode('yearly')} className={`px-6 py-2 rounded-xl text-[10px] font-black transition-all ${viewMode === 'yearly' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-400 hover:text-white'}`}>연간 분석</button>
                            </div>
                            <button onClick={() => setApplyVat(!applyVat)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl border transition-all text-[10px] font-black mr-4 ${applyVat ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-white/5 border-white/10 text-gray-400'}`}>
                                <div className={`w-3 h-3 rounded-full ${applyVat ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-gray-600'}`}></div>
                                10% 부가세 {applyVat ? '공제 중' : '미적용 (간이)'}
                            </button>
                            <label className="cursor-pointer bg-white/5 hover:bg-white/10 px-6 py-3 rounded-2xl border border-white/10 transition-all text-xs font-black text-gray-400">
                                📥 불러오기 <input type="file" className="hidden" onChange={handleImport} accept=".json" />
                            </label>
                            <button onClick={exportYearlyData} className="bg-blue-500/10 hover:bg-blue-500/20 px-6 py-3 rounded-2xl border border-blue-500/20 transition-all text-xs font-black text-blue-400">📁 {filter.year}년 아카이브 저장</button>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-black text-sm shadow-xl shadow-blue-600/20 active:scale-95 transition-all flex items-center gap-2">
                                <Icon name="plus" size={16} /> 신규 기록
                            </button>
                        </div>
                    </header>

                    {/* Dashboard Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-12 animate-fade-up" style={{ animationDelay: '0.1s' }}>
                        <Card title={selectedDay ? `${filter.month}월 ${selectedDay}일 매출` : viewMode === 'monthly' ? `${filter.month}월 입금액` : `${filter.year}년 총 매출`} value={totalIncome.toLocaleString() + '원'} sub="Gross Total revenue" icon="bar-chart-3" colorClass="from-blue-500 to-blue-700" />
                        <Card title="총 지출 내역" value={totalExpense.toLocaleString() + '원'} sub="Total operational costs" icon="credit-card" colorClass="from-rose-500 to-red-700" />
                        <Card title="순수익 (실제)" value={netProfit.toLocaleString() + '원'} sub={applyVat ? "VAT 10% Included" : "Net After Expenses"} icon="trending-up" colorClass="from-emerald-500 to-teal-700" />
                        <Card title="동일 기간 작업" value={filteredSales.filter(s => (s.type || 'income') === 'income').length + '건'} sub="Finished projects" icon="layers" colorClass="from-gray-700 to-gray-900" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12 animate-fade-up" style={{ animationDelay: '0.2s' }}>
                        {/* Trend Chart */}
                        <div className="lg:col-span-8 glass-card rounded-[2.5rem] p-10">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-xl font-black text-white">{viewMode === 'monthly' ? '수익 및 지출 추이 (6개월)' : `${filter.year}년 월별 금융 현황`}</h2>
                                <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest flex items-center gap-4">
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-500 rounded-full opacity-30"></div> 매출</div>
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> 순수익</div>
                                </div>
                            </div>
                            <div className="h-[250px] w-full">
                                <SimpleChart data={chartData} type={viewMode === 'monthly' ? 'line' : 'bar'} />
                            </div>
                        </div>

                        {/* Donut Chart (Lead Source) */}
                        <div className="lg:col-span-4 glass-card rounded-[2.5rem] p-10 flex flex-col">
                            <h2 className="text-xl font-black text-white mb-8">고객 유입 경로</h2>
                            <div className="flex-grow flex items-center justify-center">
                                <DonutChart data={sourceData} />
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12 animate-fade-up" style={{ animationDelay: '0.3s' }}>
                        {/* Premium Calendar Filter */}
                        <div className="lg:col-span-1 min-h-[450px]">
                            <PremiumCalendar
                                year={filter.year}
                                month={filter.month}
                                sales={sales}
                                selectedDay={selectedDay}
                                onDateClick={(day) => {
                                    setSelectedDay(day);
                                    if (day) setViewMode('monthly');
                                }}
                                onMonthChange={(delta) => {
                                    let newMonth = filter.month + delta;
                                    let newYear = filter.year;
                                    if (newMonth < 1) { newMonth = 12; newYear--; }
                                    if (newMonth > 12) { newMonth = 1; newYear++; }
                                    setFilter({ month: newMonth, year: newYear });
                                    setSelectedDay(null);
                                }}
                            />
                        </div>

                        {/* Table View */}
                        <div className="lg:col-span-2 glass-card rounded-[2.5rem] overflow-hidden">
                            <div className="p-10 border-b border-white/5 flex justify-between items-center">
                                <h2 className="text-xl font-black text-white">세부 매출 내역 ({selectedDay ? `${filter.month}월 ${selectedDay}일` : viewMode === 'monthly' ? `${filter.month}월` : `${filter.year}년`})</h2>
                                <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">{filteredSales.length} Records Found</div>
                            </div>
                            <div className="overflow-x-auto no-scrollbar">
                                <table className="w-full border-collapse">
                                    <thead className="bg-white/5 text-[10px] text-gray-500 font-black uppercase tracking-widest text-left">
                                        <tr>
                                            <th className="px-10 py-6">일자</th>
                                            <th className="px-10 py-6">유입 경로</th>
                                            <th className="px-10 py-6">고객/상호명</th>
                                            <th className="px-10 py-6">금액</th>
                                            <th className="px-10 py-6">상태</th>
                                            <th className="px-10 py-6 text-right">관리</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm font-medium">
                                        {filteredSales.length === 0 ? (
                                            <tr><td colSpan="6" className="px-10 py-20 text-center text-gray-600 font-bold italic">데이터가 존재하지 않습니다.</td></tr>
                                        ) : (
                                            filteredSales.map((sale, i) => (
                                                <tr key={sale.id} className="border-b border-white/5 hover:bg-white/5 transition-colors group">
                                                    <td className="px-10 py-6 text-gray-500 font-mono whitespace-nowrap">{sale.date}</td>
                                                    <td className="px-10 py-6">
                                                        <div className="flex flex-wrap gap-1 items-center max-w-[150px]">
                                                            {(sale.type === 'expense' ? (Array.isArray(sale.category) ? sale.category : [sale.category]) : [sale.leadSource || '기타']).map((label, idx) => (
                                                                <div key={idx} className="flex items-center gap-1.5 bg-white/5 px-2 py-1 rounded-lg border border-white/5">
                                                                    <div className="w-1.5 h-1.5 rounded-full" style={{ background: (sale.type === 'expense' ? EXPENSE_COLORS[label] : SOURCE_COLORS[label]) || '#64748b' }}></div>
                                                                    <span className="text-[9px] font-black uppercase text-gray-500 whitespace-nowrap">{label}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="px-10 py-6 text-white font-black">{sale.client}</td>
                                                    <td className={`px-10 py-6 font-bold ${sale.type === 'expense' ? 'text-rose-400' : 'text-blue-400'}`}>
                                                        {sale.type === 'expense' ? '-' : ''}{Number(sale.amount).toLocaleString()}원
                                                    </td>
                                                    <td className="px-10 py-6">
                                                        <span className={`text-[10px] font-black ${sale.type === 'expense' ? 'text-gray-500' :
                                                                sale.status === '입금완료' ? 'text-emerald-500' :
                                                                    sale.status === '미입금' ? 'text-orange-400' : 'text-gray-500'
                                                            }`}>{sale.type === 'expense' ? '지출' : sale.status}</span>
                                                    </td>
                                                    <td className="px-10 py-6 text-right">
                                                        <button onClick={() => deleteSale(sale.id)} className="text-gray-700 hover:text-red-500 transition-colors">
                                                            <Icon name="trash-2" size={16} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <FormModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={(data) => addSale({ ...data, id: Date.now() })} />

                    {/* Footer */}
                    <footer className="mt-20 text-center opacity-60">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em]">CLEV Maestro Admin v1.2 &copy; 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
